<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  <style>
    a[href="https://www.scalar.com"] { display: none !important; }
    div.border-sidebar-border:has(a.open-api-client-button) { padding-top: 20px; }
    a.open-api-client-button { display: none !important; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: hsl(0 0% 50% / 0.3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: hsl(0 0% 50% / 0.5); }
  </style>
</head>
<body style="margin: 0; padding: 0;">
  <div id="api-reference"></div>
  <script>
    window.Scalar.createApiReference('#api-reference', {
      url: '/schemav1.yaml',
      showDeveloperTools: 'never',
      showToolbar: 'never',
      hideTestRequestButton: true,
      baseServerURL: '',
      agent: {
        disabled: true,
      },
    });
  </script>
</body>
</html>
