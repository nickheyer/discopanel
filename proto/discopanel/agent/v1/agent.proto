syntax = "proto3";

package discopanel.agent.v1;

option go_package = "github.com/nickheyer/discopanel/pkg/proto/discopanel/agent/v1;agentv1";
option java_package = "app.discopanel.agent.proto";
option java_outer_classname = "AgentProto";

// AgentService is the machine-facing channel between a discopanel-runtime
// supervisor (running inside a server container) and the panel. The runtime
// dials the panel and holds one Session stream per server: telemetry flows
// up, commands flow down. Authentication is a per-server bearer token minted
// by the panel and delivered via the provisioned agent spec; it is validated
// in the handler (this service is not part of the user-facing API surface).
service AgentService {
  // Session is the single long-lived bidirectional stream between one
  // running server container and the panel. The first agent message must be
  // a Hello identifying the server.
  rpc Session(stream AgentMessage) returns (stream PanelMessage);
}

// AgentMessage is the envelope for everything flowing from the container to
// the panel. The same envelope is used on the in-container loopback link
// between the telemetry javaagent (inside the server JVM) and the runtime
// supervisor, which relays JVM-sourced messages upstream unchanged.
message AgentMessage {
  oneof payload {
    Hello hello = 1;
    Ready ready = 2;
    Stopping stopping = 3;
    Exited exited = 4;
    ProcSample proc_sample = 5;
    TickSample tick_sample = 6;
    JvmSample jvm_sample = 7;
    PlayerEvent player_event = 8;
    Roster roster = 9;
    TickThreadSample tick_thread_sample = 10;
  }
}

// PanelMessage is the envelope for everything flowing from the panel to the
// container. Both payloads are consumed by the runtime supervisor: console
// commands go to java stdin, chat messages are broadcast via tellraw.
message PanelMessage {
  oneof payload {
    ConsoleCommand console_command = 1;
    ChatMessage chat_message = 2;
  }
}

// Hello identifies the connecting party and is the mandatory first message
// on both the panel session and the in-container loopback link.
message Hello {
  // The DiscoPanel server ID this agent belongs to.
  string server_id = 1;
  // Source of this hello: the runtime supervisor or the in-JVM agent.
  HelloSource source = 2;
  // discopanel-runtime or javaagent version string.
  string version = 3;
  // Mod loader from the launch spec (e.g. "fabric", "paper").
  string loader = 4;
  // Minecraft version from the launch spec.
  string mc_version = 5;
  // Java major version the server runs on.
  int32 java_major = 6;
}

// HelloSource distinguishes the supervisor from the in-JVM agent.
enum HelloSource {
  HELLO_SOURCE_UNSPECIFIED = 0;
  // The Go runtime supervisor (PID 1 in the container).
  HELLO_SOURCE_RUNTIME = 1;
  // The telemetry javaagent attached to the server JVM.
  HELLO_SOURCE_JVM = 2;
}

// Ready signals the server finished starting, detected by the supervisor
// from the "Done" console line.
message Ready {
  // Seconds from process start to ready, when known (0 when unknown).
  double startup_seconds = 1;
}

// Stopping signals the server began an orderly shutdown.
message Stopping {}

// Exited reports the java process ending. Sent by the supervisor before the
// container exits, when the session is still connected.
message Exited {
  // Process exit code.
  int32 exit_code = 1;
  // True when the exit looks like a crash (non-zero exit or crash report).
  bool crashed = 2;
  // Data-dir-relative path of the newest crash report for this run, if any.
  string crash_report_path = 3;
  // First lines of the crash report, capped, for panel-side display.
  string crash_report_excerpt = 4;
}

// ProcSample is supervisor-sourced process and cgroup telemetry. It works on
// every server, with or without the in-JVM agent.
message ProcSample {
  // CPU usage of the java process as a percentage (100 = one core).
  double cpu_percent = 1;
  // Resident set size of the java process in MiB.
  double rss_mb = 2;
  // Cgroup CPU quota in cores (0 when unlimited).
  double cpu_quota_cores = 3;
  // CFS periods elapsed since the previous sample.
  int64 cfs_periods = 4;
  // CFS periods in which the cgroup was throttled since the previous sample.
  int64 cfs_throttled_periods = 5;
  // Total throttled time since the previous sample, in microseconds.
  int64 cfs_throttled_usec = 6;
  // GC pauses since the previous sample, parsed from the JVM GC log.
  GcWindow gc = 7;
}

// GcWindow aggregates GC pauses observed during one sample window.
message GcWindow {
  // Number of GC pauses in the window.
  int64 count = 1;
  // Sum of pause durations in milliseconds.
  double total_ms = 2;
  // Longest single pause in milliseconds.
  double max_ms = 3;
}

// TickSample is tick timing assembled by the supervisor from the javaagent's
// thread cadence measurement plus the server's own overload console lines.
// Works on every version and loader because it never touches game code.
message TickSample {
  // Ticks per second over the window (20 is nominal).
  double tps = 1;
  // Mean milliseconds per tick over the window.
  double mspt_avg = 2;
  // Worst tick in the window, milliseconds.
  double mspt_max = 3;
}

// TickThreadSample is the javaagent's raw measurement of the server tick
// thread over one telemetry window: the thread has alternated between tick
// work and waiting out each 50ms slot on every Minecraft version ever, so
// its busy share against that fixed cadence is the mean tick cost. Sent on
// the loopback link only; the supervisor folds it into TickSample.
message TickThreadSample {
  // Share of the window the tick thread spent running (0-1).
  double busy_fraction = 1;
  // Longest uninterrupted busy run in the window, milliseconds.
  double longest_busy_ms = 2;
}

// JvmSample is javaagent-sourced in-process JVM telemetry.
message JvmSample {
  // Used heap in MiB.
  double heap_used_mb = 1;
  // Max heap (Xmx) in MiB.
  double heap_max_mb = 2;
  // GC pauses since the previous sample, from GarbageCollectorMXBeans.
  GcWindow gc = 3;
  // Live thread count.
  int32 thread_count = 4;
  // Loaded class count.
  int32 class_count = 5;
}

// PlayerEvent is a player lifecycle or activity event, parsed by the
// supervisor from the vanilla console lines every loader prints.
message PlayerEvent {
  // What happened.
  PlayerEventType type = 1;
  // Player username.
  string player = 2;
  // Player UUID, when known.
  string uuid = 3;
  // Event detail: death message, advancement title, or chat line.
  string detail = 4;
  // Online player count after this event.
  int32 players_online = 5;
}

// PlayerEventType enumerates supervisor-sourced player events.
enum PlayerEventType {
  PLAYER_EVENT_TYPE_UNSPECIFIED = 0;
  // Player joined the server.
  PLAYER_EVENT_TYPE_JOIN = 1;
  // Player left the server.
  PLAYER_EVENT_TYPE_LEAVE = 2;
  // Player died; detail carries the death message.
  PLAYER_EVENT_TYPE_DEATH = 3;
  // Player completed an advancement; detail carries its title.
  PLAYER_EVENT_TYPE_ADVANCEMENT = 4;
  // Player chatted; detail carries the message.
  PLAYER_EVENT_TYPE_CHAT = 5;
}

// Roster is the authoritative online player list the supervisor tracks from
// console join/leave lines. Sent on every change and on session (re)connect.
message Roster {
  // Names of all online players.
  repeated string online_players = 1;
}

// ConsoleCommand asks the runtime supervisor to write one line to the java
// process stdin (works during boot and with RCON disabled).
message ConsoleCommand {
  // The command line, without trailing newline.
  string command = 1;
}

// ChatMessage asks the runtime supervisor to broadcast a chat line in game
// via a tellraw console command (works on every loader, 1.7.2+).
message ChatMessage {
  // Displayed sender name (e.g. "Panel" or a Discord username).
  string sender = 1;
  // The chat text.
  string message = 2;
}
