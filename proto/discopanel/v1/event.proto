syntax = "proto3";

package discopanel.v1;

option go_package = "github.com/nickheyer/discopanel/pkg/proto/discopanel/v1;discopanelv1";

// All-encompassing catalog of events
enum TriggeredEventType {
  TRIGGERED_EVENT_TYPE_UNSPECIFIED = 0;
  // The parent server container started
  TRIGGERED_EVENT_TYPE_SERVER_START = 1;
  // The parent server container stopped
  TRIGGERED_EVENT_TYPE_SERVER_STOP = 2;
  // The parent server passed its health check
  TRIGGERED_EVENT_TYPE_SERVER_HEALTHY = 3;
  // A player joined the server
  TRIGGERED_EVENT_TYPE_PLAYER_JOIN = 4;
  // A player left the server
  TRIGGERED_EVENT_TYPE_PLAYER_LEAVE = 5;
  // The parent server was restarted
  TRIGGERED_EVENT_TYPE_SERVER_RESTART = 6;
  // A player died, agent-sourced, data carries death message
  TRIGGERED_EVENT_TYPE_PLAYER_DEATH = 7;
  // A player completed an advancement (agent-sourced)
  TRIGGERED_EVENT_TYPE_PLAYER_ADVANCEMENT = 8;
  // A player sent a chat message (agent-sourced)
  TRIGGERED_EVENT_TYPE_PLAYER_CHAT = 9;
}
