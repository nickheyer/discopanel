syntax = "proto3";

package discopanel.v1;

import "discopanel/options/v1/options.proto";
import "discopanel/v1/storage.proto";

option go_package = "github.com/nickheyer/discopanel/pkg/proto/discopanel/v1;discopanelv1";

// Role and permission management service
service RoleService {
  // List all roles
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse) {
    option (discopanel.options.v1.perm) = {
      resource: RESOURCE_TYPE_ROLES
      action: ACTION_TYPE_READ
    };
  }
  // Get a single role
  rpc GetRole(GetRoleRequest) returns (GetRoleResponse) {
    option (discopanel.options.v1.perm) = {
      resource: RESOURCE_TYPE_ROLES
      action: ACTION_TYPE_READ
    };
  }
  // Create a new custom role
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse) {
    option (discopanel.options.v1.perm) = {
      resource: RESOURCE_TYPE_ROLES
      action: ACTION_TYPE_CREATE
    };
  }
  // Update a role
  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse) {
    option (discopanel.options.v1.perm) = {
      resource: RESOURCE_TYPE_ROLES
      action: ACTION_TYPE_UPDATE
    };
  }
  // Delete a custom role
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse) {
    option (discopanel.options.v1.perm) = {
      resource: RESOURCE_TYPE_ROLES
      action: ACTION_TYPE_DELETE
    };
  }
  // Get permission matrix for all roles
  rpc GetPermissionMatrix(GetPermissionMatrixRequest) returns (GetPermissionMatrixResponse) {
    option (discopanel.options.v1.perm) = {
      resource: RESOURCE_TYPE_ROLES
      action: ACTION_TYPE_READ
    };
  }
  // Set permissions for a role
  rpc UpdatePermissions(UpdatePermissionsRequest) returns (UpdatePermissionsResponse) {
    option (discopanel.options.v1.perm) = {
      resource: RESOURCE_TYPE_ROLES
      action: ACTION_TYPE_UPDATE
    };
  }
  // Get roles for a user
}

// Empty list request
message ListRolesRequest {}

// All roles
message ListRolesResponse {
  repeated Role roles = 1;
}

// Get role by ID
message GetRoleRequest {
  string id = 1;
}

// Single role
message GetRoleResponse {
  Role role = 1;
}

// New role details
message CreateRoleRequest {
  string name = 1;
  string description = 2;
  bool is_default = 3;
  repeated Permission permissions = 4;
}

// Created role
message CreateRoleResponse {
  Role role = 1;
}

// Role fields to update
message UpdateRoleRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
  optional bool is_default = 4;
}

// Updated role
message UpdateRoleResponse {
  Role role = 1;
}

// Role to delete
message DeleteRoleRequest {
  string id = 1;
}

// Deletion confirmation
message DeleteRoleResponse {
  string message = 1;
}

// Permission matrix request
message GetPermissionMatrixRequest {
  bool include_objects = 1;
}

// An object that can be scoped in permissions (e.g. a specific server)
message ScopeableObject {
  string id = 1;
  string name = 2;
  discopanel.options.v1.ResourceType resource = 3;
  // Entity type providing the scope objects
  discopanel.options.v1.ResourceType scope_source = 4;
}

// Valid actions per resource, derived from rpc annotations
message ResourceActions {
  discopanel.options.v1.ResourceType resource = 1;
  repeated discopanel.options.v1.ActionType actions = 2;
}

// Permission matrix response
message GetPermissionMatrixResponse {
  repeated ResourceActions resource_actions = 1;
  map<string, RolePermissions> role_permissions = 2;
  repeated ScopeableObject available_objects = 3;
}

// Permissions for a single role
message RolePermissions {
  repeated Permission permissions = 1;
}

// Update permissions for a role
message UpdatePermissionsRequest {
  string role_name = 1;
  repeated Permission permissions = 2;
}

// Update confirmation
message UpdatePermissionsResponse {
  string message = 1;
}
