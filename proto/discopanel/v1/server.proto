syntax = "proto3";

package discopanel.v1;

import "discopanel/v1/storage.proto";
import "google/protobuf/timestamp.proto";
import "discopanel/options/v1/options.proto";

option go_package = "github.com/nickheyer/discopanel/pkg/proto/discopanel/v1;discopanelv1";

// Minecraft server management
service ServerService {
  // Get all servers with optional stats
  rpc ListServers(ListServersRequest) returns (ListServersResponse);
  // Get single server details
  rpc GetServer(GetServerRequest) returns (GetServerResponse);
  // Fetch container logs
  rpc GetServerLogs(GetServerLogsRequest) returns (GetServerLogsResponse);
  // Delete container logs
  rpc ClearServerLogs(ClearServerLogsRequest) returns (ClearServerLogsResponse);
  // Find unused port
  rpc GetNextAvailablePort(GetNextAvailablePortRequest) returns (GetNextAvailablePortResponse);
  // Host physical memory and per-server allocations
  rpc GetHostMemory(GetHostMemoryRequest) returns (GetHostMemoryResponse);
  // Create new server instance
  rpc CreateServer(CreateServerRequest) returns (CreateServerResponse);
  // Modify server settings
  rpc UpdateServer(UpdateServerRequest) returns (UpdateServerResponse);
  // Set a custom server icon from an uploaded image
  rpc UploadServerIcon(UploadServerIconRequest) returns (UploadServerIconResponse);
  // Remove server and data
  rpc DeleteServer(DeleteServerRequest) returns (DeleteServerResponse);
  // Start server container
  rpc StartServer(StartServerRequest) returns (StartServerResponse);
  // Stop server container
  rpc StopServer(StopServerRequest) returns (StopServerResponse);
  // Stop and start container
  rpc RestartServer(RestartServerRequest) returns (RestartServerResponse);
  // Destroy and recreate container from scratch
  rpc RecreateServer(RecreateServerRequest) returns (RecreateServerResponse);
  // Execute console command
  rpc SendCommand(SendCommandRequest) returns (SendCommandResponse);
  // Upload server logs to mclo.gs
  rpc UploadToMCLogs(UploadToMCLogsRequest) returns (UploadToMCLogsResponse);
  // Performance findings for a server (the autopilot health check)
  rpc GetServerPerformanceReport(GetServerPerformanceReportRequest) returns (GetServerPerformanceReportResponse);
  // Historical metrics samples for charts
  rpc GetServerMetricsHistory(GetServerMetricsHistoryRequest) returns (GetServerMetricsHistoryResponse);
  // Hide a finding until its content changes, restore un-hides
  rpc DismissPerformanceFinding(DismissPerformanceFindingRequest) returns (DismissPerformanceFindingResponse);
  // Ledger of automation actions taken on a server
  rpc GetServerActions(GetServerActionsRequest) returns (GetServerActionsResponse);
  // List world backups for a server
  rpc ListBackups(ListBackupsRequest) returns (ListBackupsResponse);
  // Restore a world backup onto a stopped server
  rpc RestoreBackup(RestoreBackupRequest) returns (RestoreBackupResponse);
}

// Server list options
message ListServersRequest {
  bool full_stats = 1; // Refresh live status and stats per server
}

// All server instances
message ListServersResponse {
  repeated Server servers = 1;
}

// Server ID lookup
message GetServerRequest {
  string id = 1;
}

// Single server details
message GetServerResponse {
  Server server = 1;
}

// Log fetch parameters
message GetServerLogsRequest {
  string id = 1;
  int32 tail = 2;
}

// Single log line
message LogEntry {
  google.protobuf.Timestamp timestamp = 1;
  string message = 2;
  string level = 3;
  string source = 4;
  bool is_command = 5;
  bool is_error = 6;
}

// Container log lines
message GetServerLogsResponse {
  repeated LogEntry logs = 1;
  int32 total = 2;
}

// Server to clear logs for
message ClearServerLogsRequest {
  string id = 1;
}

// Empty log clear response
message ClearServerLogsResponse {}

// Empty port request
message GetNextAvailablePortRequest {}

// Port usage entry
message UsedPort {
  reserved 2;
  reserved "in_use";
  int32 port = 1;
}

// Available port and usage list
message GetNextAvailablePortResponse {
  int32 port = 1;
  repeated UsedPort used_ports = 2;
}

// Empty host memory request
message GetHostMemoryRequest {}

// Memory one server reserves
message ServerMemoryAllocation {
  string server_id = 1;
  string server_name = 2;
  int32 memory = 3; // Container memory limit in MB
}

// Host total memory and current reservations
message GetHostMemoryResponse {
  int64 total_mb = 1; // Physical memory on the Docker host in MB
  repeated ServerMemoryAllocation allocations = 2;
}

// New server settings
message CreateServerRequest {
  string name = 1;
  string description = 2;
  ModLoader mod_loader = 3;
  string mc_version = 4;
  int32 port = 5;
  int32 max_players = 6;
  int32 memory = 7; // Container memory limit in MB
  int32 memory_min = 19; // JVM initial heap in MB, 0 derives from memory
  int32 memory_max = 20; // JVM max heap in MB, 0 derives from memory
  string docker_image = 8;
  bool auto_start = 9;
  bool detached = 10;
  bool start_immediately = 11;
  string modpack_id = 12;
  string modpack_version_id = 13;
  string proxy_hostname = 14;
  string proxy_listener_id = 15;
  bool use_base_url = 16;
  repeated AdditionalPort additional_ports = 17;
  DockerOverrides docker_overrides = 18;
  string world_upload_session_id = 21; // Uploaded world zip to import at create
}

// Created server instance
message CreateServerResponse {
  Server server = 1;
}

// Server fields to update
message UpdateServerRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  optional int32 port = 4;
  int32 max_players = 5;
  int32 memory = 6; // Container memory limit in MB
  int32 memory_min = 17; // JVM initial heap in MB, 0 derives from memory
  int32 memory_max = 18; // JVM max heap in MB, 0 derives from memory
  ModLoader mod_loader = 7;
  string mc_version = 8;
  string docker_image = 9;
  optional bool auto_start = 10;
  optional bool detached = 11;
  reserved 12;
  reserved "tps_command";
  string modpack_id = 13;
  string modpack_version_id = 14;
  repeated AdditionalPort additional_ports = 15;
  DockerOverrides docker_overrides = 16;
}

// Updated server instance
message UpdateServerResponse {
  Server server = 1;
}

// Server icon image to convert and install
message UploadServerIconRequest {
  string id = 1;
  bytes image = 2; // Any common image format
}

// Installed icon as a data URI
message UploadServerIconResponse {
  string favicon = 1;
}

// Server to delete
message DeleteServerRequest {
  string id = 1;
}

// Empty deletion response
message DeleteServerResponse {}

// Server to start
message StartServerRequest {
  string id = 1;
}

// Start operation status
message StartServerResponse {
  string status = 1;
}

// Server to stop
message StopServerRequest {
  string id = 1;
}

// Stop operation status
message StopServerResponse {
  string status = 1;
}

// Server to restart
message RestartServerRequest {
  string id = 1;
}

// Restart operation status
message RestartServerResponse {
  string status = 1;
}

// Server to recreate
message RecreateServerRequest {
  string id = 1;
}

// Recreate operation status
message RecreateServerResponse {
  string status = 1;
}

// Console command to execute
message SendCommandRequest {
  string id = 1;
  string command = 2;
  optional bool silent = 3;
}

// Command execution result
message SendCommandResponse {
  bool success = 1;
  string output = 2;
  string error = 3;
}

// Server to upload logs for
message UploadToMCLogsRequest {
  string id = 1;
}

// mclo.gs upload result
message UploadToMCLogsResponse {
  string url = 1;
}

// Server to build a performance report for
message GetServerPerformanceReportRequest {
  string id = 1;
}

// Severity of one performance finding
enum PerformanceSeverity {
  option (discopanel.options.v1.enum_type) = {label: "Severity"};
  PERFORMANCE_SEVERITY_UNSPECIFIED = 0 [(discopanel.options.v1.value) = {label: "Unknown"}];
  // Everything checked out
  PERFORMANCE_SEVERITY_OK = 1 [(discopanel.options.v1.value) = {label: "OK"}];
  // Informational, no action needed
  PERFORMANCE_SEVERITY_INFO = 2 [(discopanel.options.v1.value) = {label: "Info"}];
  // Degrades performance, worth fixing
  PERFORMANCE_SEVERITY_WARNING = 3 [(discopanel.options.v1.value) = {label: "Warning"}];
  // Actively harming the server (stalls, OOM risk, crash)
  PERFORMANCE_SEVERITY_CRITICAL = 4 [(discopanel.options.v1.value) = {label: "Critical"}];
}

// What produced a finding
enum FindingSource {
  option (discopanel.options.v1.enum_type) = {label: "Finding Source"};
  FINDING_SOURCE_UNSPECIFIED = 0 [(discopanel.options.v1.value) = {label: "unknown"}];
  // Static config checks
  FINDING_SOURCE_CONFIG = 1 [(discopanel.options.v1.value) = {label: "config"}];
  // Live runtime and JVM telemetry
  FINDING_SOURCE_TELEMETRY = 2 [(discopanel.options.v1.value) = {label: "telemetry"}];
  // Crash forensics and automatic repair
  FINDING_SOURCE_CRASH_DOCTOR = 3 [(discopanel.options.v1.value) = {label: "crash doctor"}];
  // Mod dependency pre-flight validation
  FINDING_SOURCE_PREFLIGHT = 4 [(discopanel.options.v1.value) = {label: "mod check"}];
}

// One autopilot check result in plain language
message PerformanceFinding {
  string id = 1;
  PerformanceSeverity severity = 2;
  string title = 3;
  string detail = 4;
  FindingSource source = 5;
  repeated string evidence = 6; // short factual lines backing the finding
  string action = 7; // what automation already did about it, may be empty
  bool dismissed = 8; // hidden by the user until the finding changes
  int64 action_log_start_ms = 9; // ledger window start for View Logs, 0 when none
  string epoch = 10; // content version, dismissals expire when it changes
}

// The health check findings
message GetServerPerformanceReportResponse {
  repeated PerformanceFinding findings = 1;
  bool agent_connected = 2;
}

// Dismissal toggle for one finding
message DismissPerformanceFindingRequest {
  string id = 1;
  string finding_id = 2;
  bool restore = 3; // true un-hides instead
}

// Empty ack
message DismissPerformanceFindingResponse {}

// Ledger query, after_id pages forward from a known row
message GetServerActionsRequest {
  string id = 1;
  int64 after_id = 2;
}

// Actions ordered oldest first
message GetServerActionsResponse {
  repeated ServerAction actions = 1;
}

// A one-click fix to apply (fix_id from a finding)

// One archived world snapshot
message Backup {
  string file_name = 1;
  int64 size = 2;
  google.protobuf.Timestamp created_at = 3;
}

// Backup listing for one server
message ListBackupsRequest {
  string id = 1;
}

// Backups ordered newest first
message ListBackupsResponse {
  repeated Backup backups = 1;
}

// Restore request, server must be stopped
message RestoreBackupRequest {
  string id = 1;
  string file_name = 2;
}

// Restore outcome
message RestoreBackupResponse {
  string message = 1;
}

// Metrics history query for one server
message GetServerMetricsHistoryRequest {
  string id = 1;
  google.protobuf.Timestamp from = 2; // defaults to one hour ago
  google.protobuf.Timestamp to = 3; // defaults to now
  int32 resolution = 4; // bucket seconds, 0 picks by range
}

// Samples ordered oldest first
message GetServerMetricsHistoryResponse {
  repeated MetricsSample samples = 1;
  int32 resolution = 2; // bucket seconds actually served
}
