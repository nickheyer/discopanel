// One downloadable modpack file row
message IndexedModpackFile {
  option (protogorm.v1.model) = {
    table: "indexed_modpack_files"
    upsert: true
    queries: [
      {
        name: "GetIndexedModpackFiles"
        kind: QUERY_KIND_LIST
        where: "modpack_id = ?"
        order_by: "file_date DESC"
        params: ["modpackID string"]
      }
    ]
  };
  string id = 1 [(protogorm.v1.db) = {tag: "primaryKey"}];
  string modpack_id = 2 [(protogorm.v1.db) = {tag: "index"}];
  string display_name = 3;
  string file_name = 4;
  google.protobuf.Timestamp file_date = 5;
  int64 file_length = 6;
  ReleaseType release_type = 7;
  string download_url = 8;
  repeated string game_versions = 9;
  string mod_loader = 10;
  optional string server_pack_file_id = 11;
  IndexedModpack modpack = 12 [(protogorm.v1.db) = {tag: "constraint:OnDelete:CASCADE"}];
}

// One favorited modpack row
message ModpackFavorite {
  option (protogorm.v1.model) = {
    table: "modpack_favorites"
    order_by: "created_at DESC"
    queries: [
      {
        name: "RemoveModpackFavorite"
        kind: QUERY_KIND_DELETE
        where: "modpack_id = ?"
        params: ["modpackID string"]
      },
      {
        name: "IsModpackFavorited"
        kind: QUERY_KIND_EXISTS
        where: "modpack_id = ?"
        params: ["modpackID string"]
      },
      {
        name: "ListFavoriteModpacks"
        kind: QUERY_KIND_LIST
        preload: ["Modpack"]
      }
    ]
  };
  string id = 1 [(protogorm.v1.db) = {tag: "primaryKey"}];
  string modpack_id = 2 [(protogorm.v1.db) = {tag: "index"}];
  google.protobuf.Timestamp created_at = 3 [(protogorm.v1.db) = {tag: "autoCreateTime"}];
  IndexedModpack modpack = 4 [(protogorm.v1.db) = {tag: "constraint:OnDelete:CASCADE"}];
}

// One dismissed performance finding row
