syntax = "proto3";

// Every persisted data model lives in this file.
// Table messages carry protogorm model options, their column enums and nested msgs sit beside them,
// so the whole database schema reads top to bottom... lets try to keep it that way.
package discopanel.v1;

import "discopanel/options/v1/options.proto";
import "google/protobuf/timestamp.proto";
import "protogorm/v1/options.proto";

option go_package = "github.com/nickheyer/discopanel/pkg/proto/discopanel/v1;discopanelv1";

// Container runtime state
enum ServerStatus {
  option (discopanel.options.v1.enum_type) = {label: "Server Status"};
  SERVER_STATUS_UNSPECIFIED = 0 [(discopanel.options.v1.value) = {
    label: "Unknown"
    desc: "Status unknown"
  }];
  SERVER_STATUS_CREATING = 1 [(discopanel.options.v1.value) = {
    label: "Creating"
    desc: "Setting up the server container"
  }];
  SERVER_STATUS_STARTING = 2 [(discopanel.options.v1.value) = {
    label: "Starting"
    desc: "Booting up, hang tight"
  }];
  SERVER_STATUS_RUNNING = 3 [(discopanel.options.v1.value) = {
    label: "Running"
    desc: "Online and accepting players"
  }];
  SERVER_STATUS_STOPPING = 4 [(discopanel.options.v1.value) = {
    label: "Stopping"
    desc: "Saving the world and shutting down"
  }];
  SERVER_STATUS_STOPPED = 5 [(discopanel.options.v1.value) = {
    label: "Stopped"
    desc: "Offline, start it to play"
  }];
  SERVER_STATUS_ERROR = 7 [(discopanel.options.v1.value) = {
    label: "Error"
    desc: "Something went wrong, check the console"
  }];
  SERVER_STATUS_UNHEALTHY = 8 [(discopanel.options.v1.value) = {
    label: "Unhealthy"
    desc: "Up but not responding normally"
  }];
  SERVER_STATUS_PROVISIONING = 9 [(discopanel.options.v1.value) = {
    label: "Provisioning"
    desc: "Installing server files and mods"
  }];
  SERVER_STATUS_PAUSED = 10 [(discopanel.options.v1.value) = {
    label: "Sleeping"
    desc: "Paused while idle, joins wake it up"
  }];
}

