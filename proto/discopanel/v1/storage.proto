    table: "proxy_listeners"
    order_by: "is_default DESC, port ASC"
    guards: [
      {
        model: "Server"
        fk: "proxy_listener_id"
      }
    ]
    queries: [
      {
        name: "GetProxyListenerByPort"
        kind: QUERY_KIND_GET
        where: "port = ?"
        params: ["port int"]
      }
    ]
  };
  string id = 1 [(protogorm.v1.db) = {tag: "primaryKey"}];
  string name = 2;
  string description = 3;
  int32 port = 4 [(protogorm.v1.db) = {tag: "not null;uniqueIndex"}];
  bool enabled = 5 [(protogorm.v1.db) = {tag: "not null;default:true"}];
  bool is_default = 6 [(protogorm.v1.db) = {tag: "not null;default:false"}];
  google.protobuf.Timestamp created_at = 7 [(protogorm.v1.db) = {tag: "autoCreateTime"}];
  google.protobuf.Timestamp updated_at = 8 [(protogorm.v1.db) = {tag: "autoUpdateTime"}];
}

// A set of permissions and metadata
