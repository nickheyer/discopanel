  string description = 3;
  bool is_system = 4 [(protogorm.v1.db) = {tag: "not null;default:false"}];
  bool is_default = 5 [(protogorm.v1.db) = {tag: "not null;default:false"}];
  repeated Permission permissions = 6 [(protogorm.v1.db) = {skip: true}];
  google.protobuf.Timestamp created_at = 7 [(protogorm.v1.db) = {tag: "autoCreateTime"}];
  google.protobuf.Timestamp updated_at = 8 [(protogorm.v1.db) = {tag: "autoUpdateTime"}];
}

