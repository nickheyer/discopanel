// Extra port mapping for container
message AdditionalPort {
  string name = 1; // User-friendly name for the port (e.g., "BlueMap Web")
  int32 container_port = 2; // Port inside the container
  int32 host_port = 3; // Port on the host machine
  ModuleProtocol protocol = 4; // Defaults to TCP when unspecified
}

// Volume mount configuration for container
message VolumeMount {
  string source = 1; // Host path or volume name
  string target = 2; // Container path
  bool read_only = 3; // Mount as read-only
  string type = 4; // One of "bind" or "volume", defaults to "bind"
  bool create_dir = 5; // Pre-create source dir
}

// Container runtime customization
message DockerOverrides {
  map<string, string> environment = 1; // Additional environment variables
  repeated VolumeMount volumes = 2; // Additional volume mounts
  string network_mode = 3; // Override network mode
  string restart_policy = 4; // Override restart policy
  double cpu_limit = 5; // CPU limit (e.g., 1.5 for 1.5 cores)
  int64 memory_limit = 6; // Override memory limit in MB
  map<string, string> labels = 7; // Additional labels
  repeated string cap_add = 8; // Linux capabilities to add
  repeated string cap_drop = 9; // Linux capabilities to drop
  repeated string devices = 10; // Device mappings, e.g. "/dev/ttyUSB0" to "/dev/ttyUSB0"
  repeated string extra_hosts = 11; // Extra entries for /etc/hosts
  bool privileged = 12; // Run container in privileged mode
  bool read_only = 13; // Mount root filesystem as read-only
  repeated string security_opt = 14; // Security options
  int64 shm_size = 15; // Size of /dev/shm in bytes
  string user = 16; // User to run commands as
  string working_dir = 17; // Working directory inside container
  repeated string entrypoint = 18; // Override default entrypoint
  repeated string command = 19; // Override default command
  repeated string dns = 20; // Custom DNS servers
}

// One RBAC permission entry
message Permission {
  discopanel.options.v1.ResourceType resource = 1;
  discopanel.options.v1.ActionType action = 2;
  string object_id = 3;
}

// ModulePort defines a port mapping for a module container.
message ModulePort {
  // User-friendly name for this port (e.g., "Web UI", "API").
  string name = 1;
  // Port number inside the container.
  int32 container_port = 2;
  // Port number on the host. 0 means auto-allocate.
  int32 host_port = 3;
  // Defaults to TCP when unspecified.
  ModuleProtocol protocol = 4;
  // Whether to route traffic through the DiscoPanel proxy.
  bool proxy_enabled = 5;
}

// ModuleConfigOption is one choice for a select config field.
message ModuleConfigOption {
  // Stored env value.
  string value = 1;
  // Display label. Falls back to value when empty.
  string label = 2;
}

// ModuleConfigField is a typed config input declared by a template.
message ModuleConfigField {
  // Env variable name. Also the field identity.
  string env = 1;
  // Display label. Falls back to env when empty.
  string label = 2;
  // Help text shown under the input.
  string description = 3;
  // Input widget and value kind.
  ModuleConfigFieldType type = 4;
  // Value must be non-empty.
  bool required = 5;
  // Requirement waived while this env key is truthy.
  string required_unless = 6;
  // Initial value. Supports alias substitution.
  string default_value = 7;
  // RE2 pattern the value must match.
  string regex = 8;
  // Message shown when the regex fails.
  string regex_message = 9;
  // Minimum numeric value for number fields.
  optional int32 min = 10;
  // Maximum numeric value for number fields.
  optional int32 max = 11;
  // Choices for select fields.
  repeated ModuleConfigOption options = 12;
  // Input placeholder hint.
  string placeholder = 13;
  // Optional subsection heading in the form.
  string group = 14;
  // Violation handling. Defaults to warn when unspecified.
  ModuleConfigSeverity severity = 15;
}

// ModuleDependency declares a dependency on another module.
message ModuleDependency {
  // ID of the module this module depends on.
  string module_id = 1;
  // Wait for the dependency to pass its health check before starting.
  bool wait_for_healthy = 2;
  // Maximum seconds to wait for the dependency. 0 uses the default (60s).
  int32 timeout_seconds = 3;
}

// ModuleEventHook configures an action to take when a server event occurs.
message ModuleEventHook {
  // The event that triggers this hook.
  TriggeredEventType event = 1;
  // The action to perform when triggered.
  ModuleEventAction action = 2;
  // Command to execute for EXEC or RCON actions.
  string command = 3;
  // Seconds to wait before executing the action.
  int32 delay_seconds = 4;
  // Optional condition expression (e.g., "{{server.players_online}} == 0").
  string condition = 5;
}

// Task configuration for different task types
message CommandTaskConfig {
  string command = 1; // RCON command to execute
}

// Configuration for backup tasks
message BackupTaskConfig {
  string backup_name = 1; // Name pattern for backup (empty = task name)
  repeated string paths = 2; // Paths to include, relative to the server directory (empty = world directory)
  bool compress = 3; // Whether to compress archive contents
  int32 retention_days = 4; // Days to keep backups (0 = forever)
  int32 max_backups = 5; // Maximum number of backups to keep (0 = unlimited, takes precedence over min_backups)
  int32 min_backups = 6; // Never let retention_days expiry reduce the backup count below this
}

// Configuration for script execution tasks
message ScriptTaskConfig {
  string script_path = 1; // Path to script file
  repeated string args = 2; // Script arguments
}

// Configuration for webhook tasks. Stored serialized as JSON in ScheduledTask.config.
message WebhookTaskConfig {
  string url = 1; // Webhook destination URL
  string secret = 2; // Optional HMAC signing secret
  string payload_template = 3; // Go text/template rendered into the request body; falls back to a generic JSON payload when empty
  map<string, string> headers = 4; // Custom request headers
  int32 max_retries = 5; // Retries on delivery failure (default 3)
  int32 retry_delay_ms = 6; // Initial retry delay in ms (default 1000)
  int32 timeout_ms = 7; // HTTP timeout in ms (default 5000)
}

// System user account
message User {
  option (protogorm.v1.model) = {
    table: "users"
    order_by: "created_at DESC"
    cascades: [
      {
        model: "Session"
        fk: "user_id"
      },
      {
        model: "ApiToken"
        fk: "user_id"
      },
      {
        model: "UserRole"
        fk: "user_id"
      }
    ]
    queries: [
      {
        name: "GetUserByUsernameAndProvider"
        kind: QUERY_KIND_GET
        where: "username = ? AND auth_provider = ?"
        params: [
          "username string",
          "provider AuthProvider"
        ]
      },
      {
        name: "GetUserByOIDCSubject"
        kind: QUERY_KIND_GET
        where: "oidc_subject = ? AND oidc_subject != ''"
        params: ["subject string"]
      }
    ]
  };
  string id = 1 [(protogorm.v1.db) = {tag: "primaryKey"}];
  string username = 2 [(protogorm.v1.db) = {tag: "not null;uniqueIndex:idx_user_provider"}];
  optional string email = 3 [(protogorm.v1.db) = {tag: "index"}];
  AuthProvider auth_provider = 4 [(protogorm.v1.db) = {tag: "not null;default:1;uniqueIndex:idx_user_provider"}];
  bool is_active = 5 [(protogorm.v1.db) = {tag: "not null;default:true"}];
  repeated string roles = 6 [(protogorm.v1.db) = {skip: true}];
  google.protobuf.Timestamp created_at = 7 [(protogorm.v1.db) = {tag: "autoCreateTime"}];
  google.protobuf.Timestamp updated_at = 8 [(protogorm.v1.db) = {tag: "autoUpdateTime"}];
  optional google.protobuf.Timestamp last_login = 9;
  string password_hash = 10 [(protogorm.v1.db) = {redact: true}];
  string oidc_subject = 11 [(protogorm.v1.db) = {tag: "uniqueIndex:idx_oidc_identity,where:oidc_subject != ''"}];
  string oidc_issuer = 12 [(protogorm.v1.db) = {tag: "uniqueIndex:idx_oidc_identity,where:oidc_subject != ''"}];
}

// Minecraft server instance
message Server {
  option (protogorm.v1.model) = {
    table: "servers"
    order_by: "created_at DESC"
    skip: [
      "create",
      "update",
      "delete"
    ]
    queries: [
      {
        name: "GetServerByAgentTokenHash"
        kind: QUERY_KIND_GET
        where: "agent_token_hash = ? AND agent_token_hash != ''"
        params: ["hash string"]
      },
      {
        name: "GetServerByPort"
        kind: QUERY_KIND_GET
        where: "port = ? AND (proxy_hostname IS NULL OR proxy_hostname = '')"
        params: ["port int"]
        not_found_nil: true
      }
    ]
  };
  string id = 1 [(protogorm.v1.db) = {tag: "primaryKey"}];
  string name = 2 [(protogorm.v1.db) = {tag: "not null"}];
  string description = 3;
  ModLoader mod_loader = 4 [(protogorm.v1.db) = {tag: "not null"}];
  string mc_version = 5 [(protogorm.v1.db) = {tag: "not null"}];
  ServerStatus status = 6 [(protogorm.v1.db) = {tag: "not null"}];
  int32 port = 7;
  string proxy_hostname = 8 [(protogorm.v1.db) = {tag: "uniqueIndex:idx_proxy_hostname_listener,where:proxy_hostname != ''"}];
  string proxy_listener_id = 9 [(protogorm.v1.db) = {tag: "uniqueIndex:idx_proxy_hostname_listener,where:proxy_listener_id != ''"}];
  int32 proxy_port = 10;
  int32 max_players = 11 [(protogorm.v1.db) = {tag: "default:20"}];
  int32 memory = 12 [(protogorm.v1.db) = {tag: "default:4096"}]; // Container memory limit in MB
  int32 memory_min = 49 [(protogorm.v1.db) = {tag: "default:0"}]; // JVM initial heap (Xms) in MB
  int32 memory_max = 50 [(protogorm.v1.db) = {tag: "default:0"}]; // JVM max heap (Xmx) in MB
  string data_path = 13 [(protogorm.v1.db) = {tag: "not null"}];
  string container_id = 14;
  optional google.protobuf.Timestamp last_started = 15;
  int32 java_version = 16;
  string docker_image = 17;
  bool auto_start = 18 [(protogorm.v1.db) = {tag: "default:false"}];
  bool detached = 19 [(protogorm.v1.db) = {tag: "default:false"}];

  // Runtime stats

  int32 cpu_cores = 20 [(protogorm.v1.db) = {skip: true}];
  int64 memory_usage = 21 [(protogorm.v1.db) = {skip: true}];
  double cpu_percent = 22 [(protogorm.v1.db) = {skip: true}];
  int64 disk_usage = 23 [(protogorm.v1.db) = {skip: true}]; // Bytes this server's data dir occupies
  int64 disk_total = 24 [(protogorm.v1.db) = {skip: true}]; // Bytes the volume holds in total
  int64 disk_used = 47 [(protogorm.v1.db) = {skip: true}]; // Bytes used on the volume by everything
  int32 players_online = 25 [(protogorm.v1.db) = {skip: true}];
  int64 world_size = 39 [(protogorm.v1.db) = {skip: true}]; // Bytes of the world directories alone
  double tps = 26 [(protogorm.v1.db) = {skip: true}];

  // Additional container settings
  repeated AdditionalPort additional_ports = 27;
  DockerOverrides docker_overrides = 28 [(protogorm.v1.db) = {tag: "type:text"}];

  google.protobuf.Timestamp created_at = 29 [(protogorm.v1.db) = {tag: "autoCreateTime"}];
  google.protobuf.Timestamp updated_at = 30 [(protogorm.v1.db) = {tag: "autoUpdateTime"}];

  // SLP
  bool slp_available = 31 [(protogorm.v1.db) = {skip: true}];
  int64 slp_latency_ms = 32 [(protogorm.v1.db) = {skip: true}];
  string motd = 33 [(protogorm.v1.db) = {skip: true}];
  string server_version = 34 [(protogorm.v1.db) = {skip: true}];
  int32 protocol_version = 35 [(protogorm.v1.db) = {skip: true}];
  repeated string player_sample = 36 [(protogorm.v1.db) = {skip: true}];
  int32 max_players_slp = 37 [(protogorm.v1.db) = {skip: true}];
  string favicon = 38 [(protogorm.v1.db) = {skip: true}]; // Base64 PNG

  // Agent-sourced runtime stats (present when the disco-agent channel is live)
  bool agent_connected = 41 [(protogorm.v1.db) = {skip: true}];
  double mspt = 42 [(protogorm.v1.db) = {skip: true}]; // Mean milliseconds per tick (agent-sourced)
  double heap_used_mb = 43 [(protogorm.v1.db) = {skip: true}];
  double heap_max_mb = 44 [(protogorm.v1.db) = {skip: true}];
  double cpu_throttle_percent = 45 [(protogorm.v1.db) = {skip: true}]; // Share of CFS periods throttled (0-100)
  int32 class_count = 46 [(protogorm.v1.db) = {skip: true}]; // Loaded JVM classes (agent-sourced)

  // Runtime image digest recorded at container create
  string runtime_digest = 48;

  // In-container listen port, computed at read time
  int32 container_port = 51 [(protogorm.v1.db) = {skip: true}];

  // SHA-256 of the runtime agent's bearer token
  string agent_token_hash = 52 [(protogorm.v1.db) = {redact: true}];
  // Who wrote server-icon.png
  IconSource icon_source = 53;
}

// TCP proxy listener endpoint
message ProxyListener {
