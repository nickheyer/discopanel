// Task type enumeration
enum TaskType {
  option (discopanel.options.v1.enum_type) = {label: "Task Type"};
  TASK_TYPE_UNSPECIFIED = 0 [(discopanel.options.v1.value) = {label: "Unknown"}];
  TASK_TYPE_COMMAND = 1 [(discopanel.options.v1.value) = {
    label: "Command"
    desc: "Execute an RCON command"
  }];
  TASK_TYPE_BACKUP = 2 [(discopanel.options.v1.value) = {
    label: "Backup"
    desc: "Create a backup"
  }];
  TASK_TYPE_RESTART = 3 [(discopanel.options.v1.value) = {
    label: "Restart"
    desc: "Restart the server"
  }];
  TASK_TYPE_START = 4 [(discopanel.options.v1.value) = {
    label: "Start"
    desc: "Start the server"
  }];
  TASK_TYPE_STOP = 5 [(discopanel.options.v1.value) = {
    label: "Stop"
    desc: "Stop the server"
  }];
  TASK_TYPE_SCRIPT = 6 [(discopanel.options.v1.value) = {
    label: "Script"
    desc: "Run a custom script"
  }];
  TASK_TYPE_WEBHOOK = 7 [(discopanel.options.v1.value) = {
    label: "Webhook"
    desc: "Send an HTTP webhook"
  }];
}

// Task status enumeration
enum TaskStatus {
  option (discopanel.options.v1.enum_type) = {label: "Task Status"};
  TASK_STATUS_UNSPECIFIED = 0 [(discopanel.options.v1.value) = {label: "Unknown"}];
  TASK_STATUS_ENABLED = 1 [(discopanel.options.v1.value) = {label: "Enabled"}];
  TASK_STATUS_DISABLED = 2 [(discopanel.options.v1.value) = {label: "Disabled"}];
  TASK_STATUS_PAUSED = 3 [(discopanel.options.v1.value) = {label: "Paused"}];
}

// Schedule type enumeration
enum ScheduleType {
  option (discopanel.options.v1.enum_type) = {label: "Schedule Type"};
  SCHEDULE_TYPE_UNSPECIFIED = 0 [(discopanel.options.v1.value) = {label: "Unknown"}];
  SCHEDULE_TYPE_CRON = 1 [(discopanel.options.v1.value) = {label: "Cron expression"}];
  SCHEDULE_TYPE_INTERVAL = 2 [(discopanel.options.v1.value) = {label: "Fixed interval"}];
  SCHEDULE_TYPE_ONCE = 3 [(discopanel.options.v1.value) = {label: "Run once"}];
  SCHEDULE_TYPE_EVENT = 4 [(discopanel.options.v1.value) = {label: "On event"}];
}

// Execution status enumeration
enum ExecutionStatus {
  option (discopanel.options.v1.enum_type) = {label: "Execution Status"};
  EXECUTION_STATUS_UNSPECIFIED = 0 [(discopanel.options.v1.value) = {label: "Unknown"}];
  EXECUTION_STATUS_PENDING = 1 [(discopanel.options.v1.value) = {label: "Pending"}];
  EXECUTION_STATUS_RUNNING = 2 [(discopanel.options.v1.value) = {label: "Running"}];
  EXECUTION_STATUS_COMPLETED = 3 [(discopanel.options.v1.value) = {label: "Completed"}];
  EXECUTION_STATUS_FAILED = 4 [(discopanel.options.v1.value) = {label: "Failed"}];
  EXECUTION_STATUS_SKIPPED = 5 [(discopanel.options.v1.value) = {label: "Skipped"}];
  EXECUTION_STATUS_CANCELLED = 6 [(discopanel.options.v1.value) = {label: "Cancelled"}];
  EXECUTION_STATUS_TIMEOUT = 7 [(discopanel.options.v1.value) = {label: "Timeout"}];
}

// All-encompassing catalog of events
enum TriggeredEventType {
  option (discopanel.options.v1.enum_type) = {label: "Server Event"};
  TRIGGERED_EVENT_TYPE_UNSPECIFIED = 0 [(discopanel.options.v1.value) = {label: "Unknown"}];
  // The parent server container started
  TRIGGERED_EVENT_TYPE_SERVER_START = 1 [(discopanel.options.v1.value) = {
    label: "Server Start"
    desc: "When the server starts"
  }];
  // The parent server container stopped
  TRIGGERED_EVENT_TYPE_SERVER_STOP = 2 [(discopanel.options.v1.value) = {
    label: "Server Stop"
    desc: "When the server stops"
  }];
  // The parent server passed its health check
  TRIGGERED_EVENT_TYPE_SERVER_HEALTHY = 3 [(discopanel.options.v1.value) = {
    label: "Server Healthy"
    desc: "When the server passes its health check"
  }];
  // A player joined the server
  TRIGGERED_EVENT_TYPE_PLAYER_JOIN = 4 [(discopanel.options.v1.value) = {
    label: "Player Join"
    desc: "When a player joins (the player name is available as {{.player}})"
  }];
  // A player left the server
  TRIGGERED_EVENT_TYPE_PLAYER_LEAVE = 5 [(discopanel.options.v1.value) = {
    label: "Player Leave"
    desc: "When a player leaves (the player name is available as {{.player}})"
  }];
  // The parent server was restarted
  TRIGGERED_EVENT_TYPE_SERVER_RESTART = 6 [(discopanel.options.v1.value) = {
    label: "Server Restart"
    desc: "When the server restarts"
  }];
  // A player died, agent-sourced, data carries death message
  TRIGGERED_EVENT_TYPE_PLAYER_DEATH = 7 [(discopanel.options.v1.value) = {
    label: "Player Death"
    desc: "When a player dies ({{.player}}, death message as {{.detail}})"
  }];
  // A player completed an advancement (agent-sourced)
  TRIGGERED_EVENT_TYPE_PLAYER_ADVANCEMENT = 8 [(discopanel.options.v1.value) = {
    label: "Player Advancement"
    desc: "When a player earns an advancement ({{.player}}, advancement as {{.detail}})"
  }];
  // A player sent a chat message (agent-sourced)
  TRIGGERED_EVENT_TYPE_PLAYER_CHAT = 9 [(discopanel.options.v1.value) = {
    label: "Player Chat"
    desc: "When a player chats ({{.player}}, message as {{.detail}})"
  }];
}

// Template origin kind
enum ModuleTemplateType {
  option (discopanel.options.v1.enum_type) = {label: "Template Type"};
  MODULE_TEMPLATE_TYPE_UNSPECIFIED = 0 [(discopanel.options.v1.value) = {label: "Unknown"}];
  // Built-in templates shipped with DiscoPanel.
  MODULE_TEMPLATE_TYPE_BUILTIN = 1 [(discopanel.options.v1.value) = {label: "Built-in"}];
  // User-created custom templates.
  MODULE_TEMPLATE_TYPE_CUSTOM = 2 [(discopanel.options.v1.value) = {label: "Custom"}];
}

// ModuleStatus represents the runtime state of a module instance.
enum ModuleStatus {
  option (discopanel.options.v1.enum_type) = {label: "Module Status"};
  MODULE_STATUS_UNSPECIFIED = 0 [(discopanel.options.v1.value) = {label: "Unknown"}];
  // Container is not running.
  MODULE_STATUS_STOPPED = 1 [(discopanel.options.v1.value) = {label: "Stopped"}];
  // Container is starting up.
  MODULE_STATUS_STARTING = 2 [(discopanel.options.v1.value) = {label: "Starting"}];
  // Container is running and healthy.
  MODULE_STATUS_RUNNING = 3 [(discopanel.options.v1.value) = {label: "Running"}];
  // Container is shutting down.
  MODULE_STATUS_STOPPING = 4 [(discopanel.options.v1.value) = {label: "Stopping"}];
  // Container encountered an error.
  MODULE_STATUS_ERROR = 5 [(discopanel.options.v1.value) = {label: "Error"}];
  // Container is being created.
  MODULE_STATUS_CREATING = 6 [(discopanel.options.v1.value) = {label: "Creating"}];
}

// ModuleEventAction defines actions that can be triggered by module event hooks.
enum ModuleEventAction {
  option (discopanel.options.v1.enum_type) = {label: "Event Action"};
  MODULE_EVENT_ACTION_UNSPECIFIED = 0 [(discopanel.options.v1.value) = {label: "Unknown"}];
  // Start this module's container.
  MODULE_EVENT_ACTION_START = 1 [(discopanel.options.v1.value) = {
    label: "Start"
    desc: "Start this module's container"
  }];
  // Stop this module's container.
  MODULE_EVENT_ACTION_STOP = 2 [(discopanel.options.v1.value) = {
    label: "Stop"
    desc: "Stop this module's container"
  }];
  // Restart this module's container.
  MODULE_EVENT_ACTION_RESTART = 3 [(discopanel.options.v1.value) = {
    label: "Restart"
    desc: "Restart this module's container"
  }];
  // Execute a command inside this module's container.
  MODULE_EVENT_ACTION_EXEC = 4 [(discopanel.options.v1.value) = {
    label: "Exec"
    desc: "Execute a command inside this module's container"
  }];
  // Send an RCON command to the parent server.
  MODULE_EVENT_ACTION_RCON = 5 [(discopanel.options.v1.value) = {
    label: "RCON"
    desc: "Send an RCON command to the parent server"
  }];
}

// What caused a task execution
enum TaskTrigger {
  option (discopanel.options.v1.enum_type) = {label: "Task Trigger"};
  TASK_TRIGGER_UNSPECIFIED = 0 [(discopanel.options.v1.value) = {label: "Unknown"}];
  TASK_TRIGGER_SCHEDULED = 1 [(discopanel.options.v1.value) = {label: "Scheduled"}];
  TASK_TRIGGER_MANUAL = 2 [(discopanel.options.v1.value) = {label: "Manual"}];
  TASK_TRIGGER_EVENT = 3 [(discopanel.options.v1.value) = {label: "Event"}];
}

// Identity backend an account or role assignment came from
enum AuthProvider {
  option (discopanel.options.v1.enum_type) = {label: "Auth Provider"};
  AUTH_PROVIDER_UNSPECIFIED = 0 [(discopanel.options.v1.value) = {label: "Unknown"}];
  AUTH_PROVIDER_LOCAL = 1 [(discopanel.options.v1.value) = {label: "Local"}];
  AUTH_PROVIDER_OIDC = 2 [(discopanel.options.v1.value) = {label: "OIDC"}];
  // Synthetic admin identity while auth is disabled
  AUTH_PROVIDER_NONE = 3 [(discopanel.options.v1.value) = {label: "None"}];
  AUTH_PROVIDER_ANONYMOUS = 4 [(discopanel.options.v1.value) = {label: "Anonymous"}];
  // Module container identity minted per api token
  AUTH_PROVIDER_MODULE = 5 [(discopanel.options.v1.value) = {label: "Module"}];
}

// How a role assignment came to exist
enum RoleSource {
  option (discopanel.options.v1.enum_type) = {label: "Role Source"};
