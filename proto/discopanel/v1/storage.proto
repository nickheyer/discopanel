// Scheduled task definition
message ScheduledTask {
  option (protogorm.v1.model) = {
    table: "scheduled_tasks"
    order_by: "datetime(next_run) ASC NULLS LAST"
    cascades: [
      {
        model: "TaskExecution"
        fk: "task_id"
      }
    ]
    queries: [
      {
        name: "ListServerScheduledTasks"
        kind: QUERY_KIND_LIST
        where: "server_id = ?"
        order_by: "created_at DESC"
        params: ["serverID string"]
      },
      {
        name: "ListDueScheduledTasks"
        kind: QUERY_KIND_LIST
        where: "status = ? AND next_run IS NOT NULL AND datetime(next_run) <= datetime(?)"
        order_by: "datetime(next_run) ASC"
        params: [
          "status TaskStatus",
          "before time.Time"
        ]
      },
      {
        name: "ListEventScheduledTasks"
        kind: QUERY_KIND_LIST
        where: "server_id = ? AND status = ? AND schedule = ?"
        params: [
          "serverID string",
          "status TaskStatus",
          "schedule ScheduleType"
        ]
      }
    ]
  };
  string id = 1 [(protogorm.v1.db) = {tag: "primaryKey"}];
  string server_id = 2 [(protogorm.v1.db) = {tag: "not null;index"}];
  string name = 3 [(protogorm.v1.db) = {tag: "not null"}];
  string description = 4;
  TaskType task_type = 5 [(protogorm.v1.db) = {tag: "not null"}];
  TaskStatus status = 6 [(protogorm.v1.db) = {tag: "not null;default:1"}];
  ScheduleType schedule = 7 [(protogorm.v1.db) = {tag: "not null"}];

  // Schedule configuration
  string cron_expr = 8;
  int32 interval_secs = 9;
  google.protobuf.Timestamp run_at = 10;
  google.protobuf.Timestamp next_run = 11 [(protogorm.v1.db) = {tag: "index"}];
  google.protobuf.Timestamp last_run = 12;
  string timezone = 13 [(protogorm.v1.db) = {tag: "default:UTC"}];

  // Typed config, the field matching task_type is set
  CommandTaskConfig command_config = 14;
  BackupTaskConfig backup_config = 24;
  ScriptTaskConfig script_config = 25;
  WebhookTaskConfig webhook_config = 26;

  // Execution settings
  int32 timeout = 15 [(protogorm.v1.db) = {tag: "default:300"}];
  int32 retry_count = 16 [(protogorm.v1.db) = {tag: "default:0"}];
  int32 retry_delay = 17 [(protogorm.v1.db) = {tag: "default:60"}];
  bool require_online = 18 [(protogorm.v1.db) = {tag: "default:true"}];
  bool failure_notify = 19 [(protogorm.v1.db) = {tag: "default:false"}];

  google.protobuf.Timestamp created_at = 20 [(protogorm.v1.db) = {tag: "autoCreateTime"}];
  google.protobuf.Timestamp updated_at = 21 [(protogorm.v1.db) = {tag: "autoUpdateTime"}];

  // Events that trigger this task. Only used when schedule == SCHEDULE_TYPE_EVENT.
  repeated TriggeredEventType event_triggers = 22;
  Server server = 23 [(protogorm.v1.db) = {tag: "constraint:OnDelete:CASCADE"}];
}

