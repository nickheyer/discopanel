syntax = "proto3";

package discopanel.v1;

import "discopanel/options/v1/options.proto";
import "discopanel/v1/storage.proto";

option go_package = "github.com/nickheyer/discopanel/pkg/proto/discopanel/v1;discopanelv1";

// User management service (admin only)
service UserService {
  // Get all system users
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (discopanel.options.v1.perm) = {
      resource: RESOURCE_TYPE_USERS
      action: ACTION_TYPE_READ
    };
  }
  // Get a single user
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (discopanel.options.v1.perm) = {
      resource: RESOURCE_TYPE_USERS
      action: ACTION_TYPE_READ
    };
  }
  // Create new user account
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
    option (discopanel.options.v1.perm) = {
      resource: RESOURCE_TYPE_USERS
      action: ACTION_TYPE_CREATE
    };
  }
  // Modify user account
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
    option (discopanel.options.v1.perm) = {
      resource: RESOURCE_TYPE_USERS
      action: ACTION_TYPE_UPDATE
    };
  }
  // Remove user account
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {
    option (discopanel.options.v1.perm) = {
      resource: RESOURCE_TYPE_USERS
      action: ACTION_TYPE_DELETE
    };
  }
}

// Empty user list request
message ListUsersRequest {}

// All system users
message ListUsersResponse {
  repeated User users = 1;
}

// Get user by ID
message GetUserRequest {
  string id = 1;
}

// Single user
message GetUserResponse {
  User user = 1;
}

// New user details
message CreateUserRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  repeated string roles = 4;
}

// Created user
message CreateUserResponse {
  User user = 1;
}

// User fields to update
message UpdateUserRequest {
  string id = 1;
  optional string email = 2;
  optional bool is_active = 3;
  repeated string roles = 4;
}

// Updated user
message UpdateUserResponse {
  User user = 1;
}

// User to delete
message DeleteUserRequest {
  string id = 1;
}

// Deletion confirmation
message DeleteUserResponse {
  string message = 1;
}
