syntax = "proto3";

package discopanel.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/nickheyer/discopanel/pkg/proto/discopanel/v1;discopanelv1";

// Webhook management service
service WebhookService {
  // List all webhooks for a server
  rpc ListWebhooks(ListWebhooksRequest) returns (ListWebhooksResponse);
  // Get a specific webhook
  rpc GetWebhook(GetWebhookRequest) returns (GetWebhookResponse);
  // Create a new webhook
  rpc CreateWebhook(CreateWebhookRequest) returns (CreateWebhookResponse);
  // Update an existing webhook
  rpc UpdateWebhook(UpdateWebhookRequest) returns (UpdateWebhookResponse);
  // Delete a webhook
  rpc DeleteWebhook(DeleteWebhookRequest) returns (DeleteWebhookResponse);
  // Toggle webhook enabled/disabled
  rpc ToggleWebhook(ToggleWebhookRequest) returns (ToggleWebhookResponse);
  // Test a webhook by sending a test payload
  rpc TestWebhook(TestWebhookRequest) returns (TestWebhookResponse);
}

// Webhook event types
enum WebhookEventType {
  WEBHOOK_EVENT_TYPE_UNSPECIFIED = 0;
  WEBHOOK_EVENT_TYPE_SERVER_START = 1;
  WEBHOOK_EVENT_TYPE_SERVER_STOP = 2;
  WEBHOOK_EVENT_TYPE_SERVER_RESTART = 3;
}

// Webhook payload format
enum WebhookFormat {
  WEBHOOK_FORMAT_UNSPECIFIED = 0;
  WEBHOOK_FORMAT_GENERIC = 1;  // Standard JSON format
  WEBHOOK_FORMAT_DISCORD = 2;  // Discord-compatible embed format
}

// Webhook configuration
message Webhook {
  string id = 1;
  string server_id = 2;
  string name = 3;
  string url = 4;
  bool has_secret = 5;  // Indicates if a secret is set (actual secret not exposed)
  repeated WebhookEventType events = 6;
  bool enabled = 7;
  WebhookFormat format = 8;

  // Retry configuration
  int32 max_retries = 9;
  int32 retry_delay_ms = 10;
  int32 timeout_ms = 11;

  // Custom headers (key-value pairs)
  map<string, string> headers = 12;

  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

// List webhooks request
message ListWebhooksRequest {
  string server_id = 1;
}

// List of webhooks
message ListWebhooksResponse {
  repeated Webhook webhooks = 1;
}

// Get webhook request
message GetWebhookRequest {
  string id = 1;
}

// Single webhook details
message GetWebhookResponse {
  Webhook webhook = 1;
}

// Create webhook request
message CreateWebhookRequest {
  string server_id = 1;
  string name = 2;
  string url = 3;
  string secret = 4;  // Optional HMAC signing secret
  repeated WebhookEventType events = 5;
  WebhookFormat format = 6;

  // Optional retry configuration (uses defaults if not provided)
  int32 max_retries = 7;
  int32 retry_delay_ms = 8;
  int32 timeout_ms = 9;

  // Optional custom headers
  map<string, string> headers = 10;
}

// Newly created webhook
message CreateWebhookResponse {
  Webhook webhook = 1;
}

// Update webhook request
message UpdateWebhookRequest {
  string id = 1;
  optional string name = 2;
  optional string url = 3;
  optional string secret = 4;  // Empty string clears the secret
  repeated WebhookEventType events = 5;
  optional WebhookFormat format = 6;

  // Optional retry configuration
  optional int32 max_retries = 7;
  optional int32 retry_delay_ms = 8;
  optional int32 timeout_ms = 9;

  // Custom headers (replaces existing headers)
  map<string, string> headers = 10;
  bool clear_headers = 11;  // If true, clear all headers before applying new ones
}

// Updated webhook details
message UpdateWebhookResponse {
  Webhook webhook = 1;
}

// Delete webhook request
message DeleteWebhookRequest {
  string id = 1;
}

// Empty response for successful deletion
message DeleteWebhookResponse {}

// Toggle webhook request
message ToggleWebhookRequest {
  string id = 1;
  bool enabled = 2;
}

// Webhook with updated enabled status
message ToggleWebhookResponse {
  Webhook webhook = 1;
}

// Test webhook request
message TestWebhookRequest {
  string id = 1;
}

// Test webhook result
message TestWebhookResponse {
  bool success = 1;
  int32 response_code = 2;
  string response_body = 3;
  string error_message = 4;
  int64 duration_ms = 5;
}
